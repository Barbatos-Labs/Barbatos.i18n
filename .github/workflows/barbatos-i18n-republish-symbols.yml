name: barbatos-i18n-republish-symbols

on:
  # Chỉ chạy thủ công — dùng khi snupkg bị reject hoặc cần re-upload
  workflow_dispatch:
    inputs:
      version:
        description: 'Version cần re-upload symbols (vd: 1.0.1). Để trống = build từ code hiện tại.'
        required: false
        default: ''

jobs:
  republish-symbols:
    runs-on: windows-latest
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core SDK 10.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Fetch the certificate
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.STRONG_NAME_KEY }}")) {
            Write-Error "STRONG_NAME_KEY secret is not set or is empty."
            exit 1
          }
          $signing_keys_payload = [System.Convert]::FromBase64String("${{ secrets.STRONG_NAME_KEY }}")
          if ($signing_keys_payload.Length -eq 0) {
            Write-Error "STRONG_NAME_KEY decoded to an empty byte array. Ensure it is a valid base64-encoded .snk file."
            exit 1
          }
          $currentDirectory = Get-Location
          $certificatePath = Join-Path -Path $currentDirectory -ChildPath "src\barbatos.snk"
          [IO.File]::WriteAllBytes("$certificatePath", $signing_keys_payload)
          Write-Host "Certificate written to $certificatePath ($($signing_keys_payload.Length) bytes)"

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: phamhung

      - name: Install dependencies
        run: dotnet restore

      - name: Build (Release + SourceLink)
        run: dotnet build --configuration Release --no-restore -p:SourceLinkEnabled=true

      # Không push nupkg — chỉ re-upload snupkg
      # Không dùng --skip-duplicate để NuGet.org nhận bản symbols mới thay thế bản lỗi
      - name: Re-publish symbols to NuGet.org
        run: |
          $snupkgs = Get-ChildItem -Recurse -Filter "*.snupkg" | Where-Object { $_.FullName -notmatch "\\obj\\" }
          if ($snupkgs.Count -eq 0) {
            Write-Error "No .snupkg files found!"
            exit 1
          }
          Write-Host "Found $($snupkgs.Count) snupkg file(s):"
          $snupkgs | ForEach-Object { Write-Host "  - $($_.Name)" }

          foreach ($pkg in $snupkgs) {
            Write-Host "Pushing $($pkg.Name)..."
            dotnet nuget push "$($pkg.FullName)" `
              --source https://api.nuget.org/v3/index.json `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          }
